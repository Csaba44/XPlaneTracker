services:
  mysql:
    image: mysql:8.0.36
    env_file:
      - .env.prod
    volumes:
      - mysql_data_xtracker:/var/lib/mysql
      - ./docker/prod/mysql/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data_xtracker:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: csabi44/xtracker-backend:latest
    entrypoint: ["/bin/sh", "/var/www/docker/prod/entrypoint.sh"]
    env_file:
      - .env.prod
    restart: unless-stopped
    volumes:
      - xtracker_storage:/var/www/storage/app/public/flights
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  reverb:
    image: csabi44/xtracker-backend:latest
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    env_file:
      - .env.prod
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  artisan:
    image: csabi44/xtracker-backend:latest
    entrypoint: ["php", "/var/www/artisan"]
    env_file:
      - .env.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: csabi44/xtracker-frontend:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/prod/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/prod/nginx/certs:/etc/nginx/certs:ro
      - ./docker/prod/nginx/.htpasswd:/etc/nginx/conf.d/.htpasswd:ro
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  mysql_data_xtracker:
  xtracker_storage:
  redis_data_xtracker:
